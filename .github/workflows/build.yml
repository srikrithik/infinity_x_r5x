name: Build Infinity X 3.10 for Realme 5 r5x

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          temp-reserve-mb: 100
          swap-size-mb: 8192
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Check disk space
        run: df -h

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig openjdk-17-jdk python3 rsync
          mkdir -p ~/bin
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o ~/bin/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure git
        run: |
          git config --global user.name "srikrithik"
          git config --global user.email "your_email@gmail.com"

      - name: Init Infinity X source
        run: |
          mkdir -p workspace
          cd workspace
          repo init -u https://github.com/ProjectInfinity-X/manifest.git -b 16 --depth=1

      - name: Sync source
        run: |
          cd workspace
          repo sync -c -j2 --force-sync --no-clone-bundle --no-tags || repo sync -c -j1 --force-sync --no-clone-bundle --no-tags

      - name: Check disk after sync
        run: df -h

      - name: Clone Realme 5 trees
        run: |
          cd workspace
          git clone https://github.com/Amritorock/android_device_realme_r5x.git -b lineage-21 device/realme/r5x || true
          git clone https://github.com/Amritorock/android_device_realme_trinket-common.git -b lineage-21 device/realme/trinket-common || true
          git clone https://github.com/Amritorock/android_vendor_realme_r5x.git -b lineage-21 vendor/realme/r5x || true
          git clone https://github.com/Amritorock/android_vendor_realme_trinket-common.git -b lineage-21 vendor/realme/trinket-common || true
          git clone https://github.com/Amritorock/android_kernel_realme_sm6125.git -b lineage-21 kernel/realme/sm6125 || true

      - name: Add blur props
        run: |
          cd workspace
          if [ -f device/realme/r5x/device.mk ]; then
            echo "" >> device/realme/r5x/device.mk
            echo "# Blur Properties" >> device/realme/r5x/device.mk
            echo "PRODUCT_PRODUCT_PROPERTIES += \\" >> device/realme/r5x/device.mk
            echo "    ro.surface_flinger.supports_background_blur=1 \\" >> device/realme/r5x/device.mk
            echo "    ro.sf.blurs_are_expensive=0 \\" >> device/realme/r5x/device.mk
            echo "    persist.sys.sf.disable_blurs=0" >> device/realme/r5x/device.mk
          fi

      - name: Verify trees
        run: |
          cd workspace
          ls -la device/realme/r5x || echo "No device tree"
          ls -la vendor/realme/r5x || echo "No vendor tree"
          ls -la kernel/realme || echo "No kernel"

      - name: Build ROM
        run: |
          cd workspace
          source build/envsetup.sh
          lunch infinity_r5x-userdebug || lunch infinity_r5x-ap4a-userdebug || lunch lineage_r5x-userdebug
          mka bacon -j2 || mka infinity -j2 || m bacon -j2

      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r5x-build-output
          path: |
            workspace/out/target/product/r5x/*.zip
            workspace/out/target/product/r5x/boot.img
            workspace/out/target/product/r5x/recovery.img
            workspace/out/error.log
          if-no-files-found: ignore
