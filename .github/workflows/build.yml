name: Build Infinity X 3.10 GSI (Android 16)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 1024
          temp-reserve-mb: 100
          swap-size-mb: 4096
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          build-mount-path: '/workspace'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Aggressive cleanup
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost /usr/share/swift /usr/local/.ghcup
          sudo apt-get autoremove -y && sudo apt-get clean
          docker system prune -af || true
          df -h

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 libncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig openjdk-17-jdk python3 rsync
          mkdir -p ~/bin
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o ~/bin/repo
          chmod +x ~/bin/repo
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Configure git
        run: |
          git config --global user.name "srikrithik"
          git config --global user.email "your_email@gmail.com"
          sudo chown -R $USER:$USER /workspace

      - name: Init Infinity X source
        run: |
          cd /workspace
          mkdir -p rom && cd rom
          repo init -u https://github.com/ProjectInfinity-X/manifest.git -b 16 --depth=1 --no-clone-bundle

      - name: Sync source (GSI minimal)
        run: |
          cd /workspace/rom
          repo sync -c -j2 --force-sync --no-clone-bundle --no-tags --optimized-fetch --prune || \
          repo sync -c -j1 --force-sync --no-clone-bundle --no-tags --optimized-fetch
          df -h

      - name: Add blur to GSI
        run: |
          cd /workspace/rom
          # Find generic system properties file
          GSI_PROP="device/generic/common/gsi_system.prop"
          if [ ! -f "$GSI_PROP" ]; then
            mkdir -p device/generic/common
            touch "$GSI_PROP"
          fi
          echo "" >> "$GSI_PROP"
          echo "# Blur Properties for GSI" >> "$GSI_PROP"
          echo "ro.surface_flinger.supports_background_blur=1" >> "$GSI_PROP"
          echo "ro.sf.blurs_are_expensive=0" >> "$GSI_PROP"
          echo "persist.sys.sf.disable_blurs=0" >> "$GSI_PROP"

      - name: List GSI targets
        run: |
          cd /workspace/rom
          source build/envsetup.sh
          echo "=== Available lunch targets ==="
          lunch 2>&1 | grep -i "gsi\|generic\|arm64" || true

      - name: Build GSI
        run: |
          cd /workspace/rom
          source build/envsetup.sh
          
          # Try GSI lunch targets (whichever exists)
          lunch infinity_arm64_bgN-bp2a-userdebug 2>/dev/null || \
          lunch infinity_arm64_b-bp2a-userdebug 2>/dev/null || \
          lunch infinity_arm64-bp2a-userdebug 2>/dev/null || \
          lunch infinity_gsi_arm64-userdebug 2>/dev/null || \
          lunch aosp_arm64-bp2a-userdebug 2>/dev/null
          
          # Build only system image (GSI)
          mka systemimage -j2

      - name: Find GSI
        if: always()
        run: |
          cd /workspace/rom
          echo "=== Looking for GSI ==="
          find out/ -name "system.img" -size +500M 2>/dev/null
          ls -lh out/target/product/*/system.img 2>/dev/null

      - name: Upload GSI
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: InfinityX-GSI-Android16
          path: |
            /workspace/rom/out/target/product/*/system.img
          if-no-files-found: warn
